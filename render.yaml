# Render.com - Configuración de Servicios
# Este archivo configura automáticamente todo al conectar el repo

services:
  # Aplicación Next.js
  - type: web
    name: shanklish-erp
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: shanklish-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: shanklish-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://shanklish-erp.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: Shanklish Caracas ERP
    autoDeploy: true

# Base de datos PostgreSQL
databases:
  - name: shanklish-db
    plan: free
    region: oregon
