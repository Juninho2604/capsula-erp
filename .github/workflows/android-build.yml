name: Android APK Build

# Buildea el APK Trusted Web Activity (TWA) desde android/twa-manifest.json
# usando Bubblewrap CLI y lo firma con el keystore guardado en secrets.
#
# Secrets requeridos (creados por android-keystore-bootstrap.yml):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_PASSWORD
#   ANDROID_KEY_ALIAS
#
# Triggers:
#   - workflow_dispatch (manual desde la pestaña Actions)
#   - push de tag vX.Y.Z (genera release de GitHub con el APK adjunto)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (semver, ej: 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      version_code:
        description: 'Version code (entero monotónico)'
        required: true
        default: '1'
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build signed TWA APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'cmdline-tools;latest platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Determine version (from tag or input)
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
            VERSION_CODE=$(date +%s)
          else
            VERSION_NAME="${{ inputs.version_name }}"
            VERSION_CODE="${{ inputs.version_code }}"
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building KPSULA ERP v$VERSION_NAME (code $VERSION_CODE)"

      - name: Patch twa-manifest with version + signing key
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          cd android
          # Apunta la ruta del keystore al workspace y aplica versiones
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.appVersionName = process.env.VERSION_NAME;
            m.appVersionCode = parseInt(process.env.VERSION_CODE, 10);
            m.signingKey = { path: './android.keystore', alias: process.env.KEY_ALIAS };
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('twa-manifest.json patched: v' + m.appVersionName + ' (code ' + m.appVersionCode + ')');
          "

      - name: Restore keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Run android-keystore-bootstrap.yml first."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/android.keystore
          test -s android/android.keystore || { echo "::error::Decoded keystore is empty"; exit 1; }

      # Bubblewrap prompts interactively ("Do you want to install the JDK? (Y/n)")
      # cuando no encuentra ~/.bubblewrap/config.json. En CI ese prompt recibe EOF
      # y aborta con exit 130. Escribimos el config apuntando al JDK (setup-java) y
      # al Android SDK (setup-android) ya instalados para que corra sin interacción.
      - name: Configure Bubblewrap (non-interactive JDK + Android SDK)
        run: |
          set -euo pipefail
          : "${JAVA_HOME:?JAVA_HOME no está seteado (setup-java falló?)}"
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          : "${SDK_PATH:?ANDROID_HOME/ANDROID_SDK_ROOT no está seteado (setup-android falló?)}"
          export SDK_PATH

          # Bubblewrap.validatePath() exige que exista ${SDK}/tools o ${SDK}/bin.
          # Un SDK moderno (instalado vía cmdline-tools) no tiene el dir legacy `tools`,
          # así que bubblewrap rechaza el SDK con "The provided androidSdk isn't correct".
          # Symlink tools -> cmdline-tools/latest para satisfacer la validación (y de paso
          # bubblewrap encuentra sdkmanager en tools/bin/sdkmanager).
          if [ ! -e "$SDK_PATH/tools" ]; then
            if [ -d "$SDK_PATH/cmdline-tools/latest" ]; then
              ln -s "$SDK_PATH/cmdline-tools/latest" "$SDK_PATH/tools"
            else
              CLT_DIR=$(find "$SDK_PATH/cmdline-tools" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -1 || true)
              [ -n "$CLT_DIR" ] && ln -s "$CLT_DIR" "$SDK_PATH/tools"
            fi
          fi
          echo "== SDK_PATH=$SDK_PATH =="
          ls -la "$SDK_PATH"
          ls -la "$SDK_PATH/tools" || echo "(sin tools/)"

          node -e "const fs=require('fs'),os=require('os'),path=require('path');const dir=path.join(os.homedir(),'.bubblewrap');fs.mkdirSync(dir,{recursive:true});const cfg={jdkPath:process.env.JAVA_HOME,androidSdkPath:process.env.SDK_PATH};fs.writeFileSync(path.join(dir,'config.json'),JSON.stringify(cfg,null,2));console.log('Bubblewrap config written:',JSON.stringify(cfg));"

      - name: Bubblewrap update (scaffold Android project from twa-manifest.json)
        working-directory: android
        run: |
          set -euo pipefail
          # NO usamos `bubblewrap init`: trata --manifest como un WEB manifest (lo
          # fetchea) y es 100% interactivo (confirmTwaConfig pregunta host, nombre,
          # íconos, key, etc.) sin modo no-interactivo → en CI aborta con exit 130.
          #
          # Para un twa-manifest.json ya completo, `update` es la vía no-interactiva:
          # lee el TWA manifest local (fromFile), regenera el proyecto Android desde
          # cero y escribe manifest-checksum.txt, así `build` no pregunta por regenerar.
          # --skipVersionUpgrade preserva el appVersionCode que seteamos en el patch.
          bubblewrap update --skipVersionUpgrade

      - name: Bubblewrap build (assembles signed APK)
        working-directory: android
        env:
          # Bubblewrap reads these env vars when present and skips the interactive
          # password prompts.
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # stdin desde /dev/null: si por algo apareciera un prompt inesperado,
          # falla rápido (EOF → exit 130) en vez de colgarse hasta el timeout.
          # Las passwords NO van por stdin: vienen de BUBBLEWRAP_*_PASSWORD (env).
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias=kpsula \
            < /dev/null

      - name: Locate built APK
        id: apk
        working-directory: android
        run: |
          set -euo pipefail
          APK_PATH=$(find . -name "app-release-signed.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::Signed APK not found after build."
            find . -name "*.apk" -type f
            exit 1
          fi
          FINAL_NAME="kpsula-erp-v${{ steps.version.outputs.name }}.apk"
          cp "$APK_PATH" "$FINAL_NAME"
          echo "path=android/$FINAL_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$FINAL_NAME" >> "$GITHUB_OUTPUT"
          ls -la "$FINAL_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: KPSULA ERP ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
