name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate (lint + typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: capsula_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d capsula_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/capsula_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      # FASE 3 BLOCKER: prisma/migrations/ carece de un baseline 0_init porque
      # el schema base fue creado originalmente vía `prisma db push` en la era
      # pre-migrations. Las migraciones actuales son solo deltas y fallan
      # al correr contra una DB vacía (la primera ALTER sobre PurchaseOrder
      # asume que la tabla ya existe).
      #
      # Volver a `prisma migrate deploy` cuando se cree la migración baseline.
      - name: Sync schema to database (CI bypasses migration history)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  # Deploy al VPS Contabo (kpsula.app).
  #
  # Triggers:
  #   - push a main → auto-deploy tras `validate` verde.
  #   - workflow_dispatch → manual desde la pestaña Actions (rollback, redeploy, etc.).
  #
  # Concurrency: un solo deploy a la vez; si llega otro push, cancela el corriente
  # para evitar swaps atómicos solapados sobre /root/capsula-erp/current.
  #
  # Secrets requeridos en el repo (Settings → Secrets and variables → Actions):
  #   CONTABO_HOST    — IP o hostname del VPS (e.g. 147.93.6.70)
  #   CONTABO_USER    — usuario SSH (root)
  #   CONTABO_SSH_KEY — clave privada SSH ed25519 con acceso a authorized_keys del VPS
  #
  # El script /root/deploy-capsula.sh hace todo el flujo seguro:
  #   backup BD → clone fresh → build → smoke test Prisma → swap atómico → pm2 restart.
  # Si falla en el smoke test, aborta sin tocar la instalación viva.
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-contabo-main
      cancel-in-progress: true
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            echo ">>> Ejecutando deploy-capsula.sh"
            bash /root/deploy-capsula.sh main
            echo ">>> Deploy completado OK"
