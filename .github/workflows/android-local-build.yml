name: Android Local APK Build

# Buildea "KPSULA Local" (android-local/): la app WebView para las tablets
# del restaurante que carga el SERVIDOR LOCAL (http://<ip-lan>) a pantalla
# completa con reconexión automática. Ver docs/LOCAL_SERVER.md.
#
# Firma con el MISMO keystore del TWA (secrets de android-keystore-bootstrap.yml):
#   ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
#   ANDROID_KEY_PASSWORD / ANDROID_KEY_ALIAS
#
# Trigger: manual (Actions → Android Local APK Build → Run workflow).
# El APK queda como artifact "kpsula-local-apk" del run.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ej: 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      version_code:
        description: 'Version code (entero monotónico)'
        required: true
        default: '1'
        type: string

jobs:
  build:
    name: Build signed KPSULA Local APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Restore keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Run android-keystore-bootstrap.yml first."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/android.keystore"
          test -s "$RUNNER_TEMP/android.keystore" || { echo "::error::Decoded keystore is empty"; exit 1; }

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/android.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          gradle -p android-local assembleRelease \
            -PversionName="${{ inputs.version_name }}" \
            -PversionCode="${{ inputs.version_code }}"
          APK=$(find android-local/app/build/outputs/apk/release -name '*.apk' | head -1)
          test -n "$APK" || { echo "::error::No se generó el APK"; exit 1; }
          cp "$APK" "kpsula-local-${{ inputs.version_name }}.apk"
          ls -lh kpsula-local-*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpsula-local-apk
          path: kpsula-local-*.apk
          retention-days: 90
