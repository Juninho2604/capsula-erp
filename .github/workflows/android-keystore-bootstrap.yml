name: Android Keystore Bootstrap

# Workflow one-shot. Correrlo UNA SOLA VEZ desde la pestaña Actions
# para generar el keystore Android y obtener el SHA-256 fingerprint.
#
# 🔒 SEGURIDAD: este repo es PÚBLICO → los logs de Actions son legibles por
# cualquiera. Por eso la passphrase del keystore se toma de un SECRET
# (GitHub la enmascara como *** en los logs), NUNCA de un input de
# workflow_dispatch (los inputs se imprimen en texto plano en el bloque env:).
#
# ANTES de correr este workflow:
#   Crear el secret ANDROID_KEYSTORE_PASSWORD con una passphrase fuerte
#   (Settings → Secrets and variables → Actions → New repository secret).
#
# DESPUÉS de correrlo:
#   1. Descargar el artefacto "kpsula-android-keystore" (zip).
#      Contiene: android.keystore, android.keystore.b64, keystore-info.txt
#   2. GUARDAR android.keystore en al menos 2 lugares seguros (Drive cifrado + USB).
#      Si se pierde, NO se podrán publicar más actualizaciones del APK.
#   3. BORRAR este workflow run desde la UI (menú "..." → Delete workflow run)
#      para que el artefacto con el keystore no quede colgado en un repo público.
#   4. Crear los secrets restantes (Settings → Secrets and variables → Actions):
#        ANDROID_KEYSTORE_BASE64   = contenido completo de android.keystore.b64
#        ANDROID_KEY_PASSWORD      = MISMA passphrase que ANDROID_KEYSTORE_PASSWORD
#        ANDROID_KEY_ALIAS         = kpsula
#   5. Copiar el SHA-256 de los logs (o de keystore-info.txt) a
#      public/.well-known/assetlinks.json reemplazando el placeholder.
#   6. Mergear ese cambio a main para que kpsula.app/.well-known/assetlinks.json
#      sirva el fingerprint correcto.
#
# Después de bootstrap, usar android-build.yml para generar APKs.

on:
  workflow_dispatch:
    inputs:
      common_name:
        description: 'CN del certificado (ej: KPSULA ERP)'
        required: false
        default: 'KPSULA ERP'
        type: string
      organization:
        description: 'Organización (O)'
        required: false
        default: 'KPSULA'
        type: string
      country:
        description: 'Código país (C, 2 letras)'
        required: false
        default: 'VE'
        type: string

jobs:
  bootstrap:
    name: Generate Android signing keystore
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify password secret is set
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KS_PASSWORD:-}" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_PASSWORD no está configurado. Crealo primero (Settings → Secrets and variables → Actions → New repository secret) y volvé a correr este workflow."
            exit 1
          fi
          if [ "${#KS_PASSWORD}" -lt 6 ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD debe tener al menos 6 caracteres (requisito de keytool)."
            exit 1
          fi
          echo "ANDROID_KEYSTORE_PASSWORD presente (longitud OK)."

      - name: Generate keystore (RSA 2048, validity 10000 days)
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CN: ${{ inputs.common_name }}
          ORG: ${{ inputs.organization }}
          COUNTRY: ${{ inputs.country }}
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -v \
            -keystore android.keystore \
            -alias kpsula \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KS_PASSWORD" \
            -keypass "$KS_PASSWORD" \
            -dname "CN=$CN, O=$ORG, C=$COUNTRY"

      - name: Export base64 (for GitHub secret) and SHA-256 fingerprint
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          base64 -w 0 android.keystore > android.keystore.b64

          # Extraer SHA-256 en formato asset-links (sin "SHA256:" prefix, con dos puntos)
          SHA256=$(keytool -list -v \
            -keystore android.keystore \
            -alias kpsula \
            -storepass "$KS_PASSWORD" \
            | grep -E 'SHA256:' \
            | head -1 \
            | sed 's/.*SHA256: //' \
            | tr -d ' ')

          {
            echo "=================================================="
            echo " KPSULA Android signing keystore — bootstrap info"
            echo "=================================================="
            echo ""
            echo "Package ID:       app.kpsula.erp"
            echo "Key alias:        kpsula"
            echo "Algorithm:        RSA 2048, validity 10000 days"
            echo "Generated at:     $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "SHA-256 fingerprint (paste into public/.well-known/assetlinks.json):"
            echo ""
            echo "  $SHA256"
            echo ""
            echo "--------------------------------------------------"
            echo " Next steps:"
            echo "--------------------------------------------------"
            echo " 1. Download this artifact and STORE android.keystore"
            echo "    in at least 2 secure locations (encrypted Drive + USB)."
            echo "    Losing it = cannot publish app updates ever again."
            echo ""
            echo " 2. DELETE this workflow run from the UI so the keystore"
            echo "    artifact does not linger on a public repo."
            echo ""
            echo " 3. Create these repository secrets:"
            echo "      ANDROID_KEYSTORE_BASE64   <- contents of android.keystore.b64"
            echo "      ANDROID_KEY_PASSWORD      <- same as ANDROID_KEYSTORE_PASSWORD"
            echo "      ANDROID_KEY_ALIAS         <- kpsula"
            echo ""
            echo " 4. Update public/.well-known/assetlinks.json with the SHA-256 above."
            echo ""
            echo " 5. Merge to main so https://kpsula.app/.well-known/assetlinks.json"
            echo "    serves the fingerprint, then run android-build.yml."
            echo "=================================================="
          } > keystore-info.txt

          # El SHA-256 NO es secreto (debe ser público en assetlinks.json), así que
          # lo imprimimos para visibilidad inmediata. La passphrase viene de un
          # secret y GitHub la enmascara como *** — nunca aparece en claro.
          cat keystore-info.txt

      - name: Upload keystore + metadata as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpsula-android-keystore
          path: |
            android.keystore
            android.keystore.b64
            keystore-info.txt
          # Retención corta: el keystore va en un repo público, hay que bajarlo
          # y borrar el run cuanto antes.
          retention-days: 1
          if-no-files-found: error
