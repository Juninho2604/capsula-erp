name: Android Keystore Bootstrap

# Workflow one-shot. Corrérlo UNA SOLA VEZ desde la pestaña Actions
# para generar el keystore Android y obtener el SHA-256 fingerprint.
#
# Después de correrlo:
#   1. Descargar el artefacto "kpsula-android-keystore" (zip).
#      Contiene: android.keystore, android.keystore.b64, keystore-info.txt
#   2. GUARDAR android.keystore en al menos 2 lugares seguros (Drive cifrado + USB).
#      Si se pierde, NO se podrán publicar más actualizaciones del APK.
#   3. Crear estos repository secrets (Settings → Secrets and variables → Actions):
#        ANDROID_KEYSTORE_BASE64   = contenido completo de android.keystore.b64
#        ANDROID_KEYSTORE_PASSWORD = (la passphrase usada al generar — ver inputs)
#        ANDROID_KEY_PASSWORD      = (igual a la anterior por defecto)
#        ANDROID_KEY_ALIAS         = kpsula
#   4. Copiar el SHA-256 de keystore-info.txt a public/.well-known/assetlinks.json
#      reemplazando "REPLACE_WITH_SHA256_FROM_KEYSTORE_BOOTSTRAP_WORKFLOW".
#   5. Mergear esos cambios a main para que kpsula.app/.well-known/assetlinks.json
#      sirva el fingerprint correcto.
#   6. Borrar este workflow (o dejarlo, pero ya no se corre).
#
# Después de bootstrap, usar android-build.yml para generar APKs.

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Passphrase del keystore (mín 6 chars). Guardarla también en ANDROID_KEYSTORE_PASSWORD secret.'
        required: true
        type: string
      common_name:
        description: 'CN del certificado (ej: KPSULA ERP)'
        required: false
        default: 'KPSULA ERP'
        type: string
      organization:
        description: 'Organización (O)'
        required: false
        default: 'KPSULA'
        type: string
      country:
        description: 'Código país (C, 2 letras)'
        required: false
        default: 'VE'
        type: string

jobs:
  bootstrap:
    name: Generate Android signing keystore
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore (RSA 2048, validity 10000 days)
        env:
          KS_PASSWORD: ${{ inputs.keystore_password }}
          CN: ${{ inputs.common_name }}
          ORG: ${{ inputs.organization }}
          COUNTRY: ${{ inputs.country }}
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -v \
            -keystore android.keystore \
            -alias kpsula \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KS_PASSWORD" \
            -keypass "$KS_PASSWORD" \
            -dname "CN=$CN, O=$ORG, C=$COUNTRY"

      - name: Export base64 (for GitHub secret) and SHA-256 fingerprint
        env:
          KS_PASSWORD: ${{ inputs.keystore_password }}
        run: |
          set -euo pipefail
          base64 -w 0 android.keystore > android.keystore.b64

          # Extraer SHA-256 en formato asset-links (sin "SHA256:" prefix, con dos puntos)
          SHA256=$(keytool -list -v \
            -keystore android.keystore \
            -alias kpsula \
            -storepass "$KS_PASSWORD" \
            | grep -E 'SHA256:' \
            | head -1 \
            | sed 's/.*SHA256: //' \
            | tr -d ' ')

          {
            echo "=================================================="
            echo " KPSULA Android signing keystore — bootstrap info"
            echo "=================================================="
            echo ""
            echo "Package ID:       app.kpsula.erp"
            echo "Key alias:        kpsula"
            echo "Algorithm:        RSA 2048, validity 10000 days"
            echo "Generated at:     $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "SHA-256 fingerprint (paste into public/.well-known/assetlinks.json):"
            echo ""
            echo "  $SHA256"
            echo ""
            echo "--------------------------------------------------"
            echo " Next steps:"
            echo "--------------------------------------------------"
            echo " 1. Download this artifact and STORE android.keystore"
            echo "    in at least 2 secure locations (encrypted Drive + USB)."
            echo "    Losing it = cannot publish app updates ever again."
            echo ""
            echo " 2. Create these repository secrets:"
            echo "      ANDROID_KEYSTORE_BASE64   <- contents of android.keystore.b64"
            echo "      ANDROID_KEYSTORE_PASSWORD <- the password you provided"
            echo "      ANDROID_KEY_PASSWORD      <- same password"
            echo "      ANDROID_KEY_ALIAS         <- kpsula"
            echo ""
            echo " 3. Update public/.well-known/assetlinks.json with the SHA-256 above."
            echo ""
            echo " 4. Merge to main so https://kpsula.app/.well-known/assetlinks.json"
            echo "    serves the fingerprint, then run android-build.yml."
            echo "=================================================="
          } > keystore-info.txt

          # También imprime en logs para visibilidad inmediata (el SHA-256 no es secreto;
          # de hecho debe ser público en assetlinks.json. La clave privada SÍ es secreta.)
          cat keystore-info.txt

      - name: Upload keystore + metadata as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpsula-android-keystore
          path: |
            android.keystore
            android.keystore.b64
            keystore-info.txt
          retention-days: 7
          if-no-files-found: error
