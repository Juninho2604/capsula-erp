# nginx del SERVIDOR LOCAL del restaurante — sirve la app a la LAN por :80.
# Instalado por install-local-server.sh en /etc/nginx/sites-available/capsula-local
# Las tablets/cajas apuntan a http://<ip-fija-del-servidor>
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }
}
